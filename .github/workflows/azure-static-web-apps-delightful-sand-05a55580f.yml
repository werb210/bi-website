name: Azure Static Web Apps CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
jobs:
  build_and_deploy:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
      # BI_WEBSITE_BLOCK_v170_DEPLOY_STAMP_VERIFY_v1
      - name: Build and Deploy
        id: deploy
        if: github.ref == 'refs/heads/main'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "dist"
          production_branch: main
          deployment_environment: production
      # BI_WEBSITE_BLOCK_v170 — verify the deploy actually landed at the SWA
      # Todd is staring at. If the AZURE_STATIC_WEB_APPS_API_TOKEN secret
      # points to a DIFFERENT SWA (e.g. token rotated when the SWA was
      # recreated and never refreshed in repo secrets), the upload action
      # will report success against whichever SWA the token authorizes,
      # while the public URL keeps serving the older bundle. This step
      # fetches the stamp file from the public URL and fails the workflow
      # loudly if it's missing or stale, instead of silently deploying
      # to the void. Allow up to 90s for SWA propagation.
      - name: Verify deploy reached delightful-sand-05a55580f
        if: github.ref == 'refs/heads/main'
        run: |
          URL="https://delightful-sand-05a55580f.7.azurestaticapps.net/.codex-runs/v170.stamp"
          EXPECTED="$(cat public/.codex-runs/v170.stamp)"
          for i in 1 2 3 4 5 6; do
            sleep 15
            ACTUAL="$(curl -fsSL --max-time 10 "$URL" || true)"
            if [ "$ACTUAL" = "$EXPECTED" ]; then
              echo "OK: deploy reached delightful-sand-05a55580f"
              exit 0
            fi
            echo "attempt $i: stamp mismatch (got: '$ACTUAL', want: '$EXPECTED')"
          done
          echo "::error::Deploy succeeded against the API token but the public"
          echo "::error::URL still serves a different bundle. The most likely"
          echo "::error::cause is that AZURE_STATIC_WEB_APPS_API_TOKEN points to"
          echo "::error::a DIFFERENT SWA than delightful-sand-05a55580f. Regen"
          echo "::error::the deployment token from the Azure portal pane for"
          echo "::error::delightful-sand-05a55580f (Manage deployment token),"
          echo "::error::paste it into this repo's secret of the same name, and"
          echo "::error::re-run the workflow."
          exit 1
  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Azure Static Web Apps Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
